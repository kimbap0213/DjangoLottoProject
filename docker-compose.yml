services:
  db:
    image: mysql:8.0
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      - MYSQL_DATABASE=lottodb
      - MYSQL_USER=lotto_user
      - MYSQL_PASSWORD=lotto_password
      - MYSQL_ROOT_PASSWORD=root_password
    ports:
      - "3306:3306"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=lottodb
      - DB_USER=lotto_user
      - DB_PASSWORD=lotto_password
      - DB_HOST=db
      - DB_PORT=3306
    depends_on:
      - db

volumes:
  mysql_data: